<!DOCTYPE html>
<html>
<head>
    <title>SEO Readability Analyzer Test</title>
    <script src="analyzer.js"></script>
</head>
<body>
    <h1>Test Results</h1>
    <div id="results"></div>
    
    <script>
        const analyzer = new ReadabilitySEOAnalyzer();
        
        // Test content
        const testContent = `This is a simple test content. It has multiple sentences.
        
        The content should be easy to read. Each sentence is short and clear.
        
        This makes for good readability. SEO is also important for content.
        
        Keywords should be used naturally. Not too much, not too little.`;
        
        const testTitle = "Test Title for SEO Analysis";
        const testMeta = "This is a test meta description for checking SEO optimization.";
        
        // Run analysis
        const results = analyzer.analyze(testContent, testTitle, testMeta);
        
        // Display results
        document.getElementById('results').innerHTML = `
            <h2>Readability Analysis</h2>
            <p><strong>Flesch Reading Ease:</strong> ${results.readability.fleschReadingEase}</p>
            <p><strong>Grade Level:</strong> ${results.readability.fleschKincaidGrade}</p>
            <p><strong>Reading Level:</strong> ${results.readability.readingLevel}</p>
            <p><strong>Words:</strong> ${results.readability.totalWords}</p>
            <p><strong>Sentences:</strong> ${results.readability.totalSentences}</p>
            
            <h2>SEO Analysis</h2>
            <p><strong>Overall SEO Score:</strong> ${results.seo.overallSEOScore}</p>
            <p><strong>Title Score:</strong> ${results.seo.title.score} (${results.seo.title.length} chars)</p>
            <p><strong>Meta Score:</strong> ${results.seo.metaDescription.score} (${results.seo.metaDescription.length} chars)</p>
            <p><strong>Keyword Density:</strong> ${results.seo.keywordDensity.density}% (score: ${results.seo.keywordDensity.score})</p>
            <p><strong>Content Length:</strong> ${results.seo.contentLength.words} words (score: ${results.seo.contentLength.score})</p>
            
            <h2>Suggestions (${results.suggestions.length})</h2>
            <ul>
                ${results.suggestions.map(s => `<li><strong>${s.priority}:</strong> ${s.message} - ${s.action}</li>`).join('')}
            </ul>
            
            <h2>Test Passed! ✅</h2>
            <p>Algorithm is working correctly. Ready for deployment.</p>
        `;
    </script>
</body>
</html>
